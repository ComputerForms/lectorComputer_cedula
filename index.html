<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector AR</title>

<!-- A-Frame & MindAR -->
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f5132,#198754,#20c997);
    overflow:hidden;
}

/* Fondo decorativo */
body::before{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    top:-150px;
    right:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    background:rgba(255,255,255,.05);
    bottom:-120px;
    left:-80px;
}

/* Login */

#login-overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(12px);
    background:rgba(0,0,0,.35);
    z-index:9999;
}

#login-box{
    width:90%;
    max-width:430px;
    padding:45px;
    border-radius:25px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(20px);
    box-shadow:0 20px 45px rgba(0,0,0,.35);
    animation:mostrar .7s ease;
}

@keyframes mostrar{
    from{
        opacity:0;
        transform:translateY(-25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    width:95px;
    height:95px;
    margin:auto;
    margin-bottom:25px;
    border-radius:50%;
    background:linear-gradient(135deg,#00c853,#43a047);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    color:white;
    box-shadow:0 10px 25px rgba(0,200,83,.35);
}

h2{
    color:white;
    text-align:center;
    margin-bottom:8px;
    font-weight:600;
}

.subtitle{
    text-align:center;
    color:#d8ffe6;
    margin-bottom:30px;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#fff;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:15px;
    transition:.3s;
}

.input-group input::placeholder{
    color:#dddddd;
}

.input-group input:focus{
    background:rgba(255,255,255,.22);
    box-shadow:0 0 0 2px #8dffb3;
}

#login-btn{
    width:100%;
    margin-top:10px;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:linear-gradient(135deg,#00c853,#2e7d32);
    color:white;
    font-size:16px;
    font-weight:600;
    transition:.3s;
}

#login-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(0,200,83,.35);
}

#error-msg{
    display:none;
    text-align:center;
    margin-top:18px;
    color:#ffd7d7;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#dfffe9;
    font-size:12px;
}

a-scene{
    position:absolute;
    inset:0;
}
</style>

</head>

<body>

<div id="login-overlay">

<div id="login-box">

<div class="logo">
emez
</div>

<h2>Lector de Realidad Aumentada</h2>

<p class="subtitle">
Accede al sistema para iniciar el escaneo AR
</p>

<div class="input-group">
<label>Usuario</label>
<input
type="text"
id="username"
placeholder="Ingresa tu usuario">
</div>

<div class="input-group">
<label>Contraseña</label>
<input
type="password"
id="password"
placeholder="Ingresa tu contraseña">
</div>

<button id="login-btn">
Ingresar al sistema
</button>

<p id="error-msg">
Usuario o contraseña incorrectos.
</p>

<div class="footer">
© 2026 Sistema de Lector AR
</div>

</div>

</div>

<!-- Escena AR -->

<a-scene
id="ar-scene"
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
style="visibility:hidden;">

<a-assets>
<a-asset-item
id="avatarModel"
src="Logo1.glb">
</a-asset-item>
</a-assets>

<a-camera
position="0 0 0"
look-controls="enabled:false">
</a-camera>

<a-entity
mindar-image-target="targetIndex:0; smooth:true; smoothCount:10; smoothTolerance:0.01; smoothThreshold:5">

<a-gltf-model
src="#avatarModel"
rotation="0 0 0"
position="0 0 0"
scale="1000 1000 1000"
animation="property:position;
to:0 0 0;
dur:1000;
easing:easeInOutQuad;
loop:true;
dir:alternate">
</a-gltf-model>

</a-entity>

</a-scene>

<script>

const VALID_USER="admin";
const VALID_PASS="1234";

document.getElementById("login-btn").addEventListener("click",()=>{

const user=document.getElementById("username").value.trim();
const pass=document.getElementById("password").value;

if(user===VALID_USER && pass===VALID_PASS){

document.getElementById("login-overlay").style.display="none";

const scene=document.getElementById("ar-scene");
scene.style.visibility="visible";

if(scene.hasLoaded){
startMindAR();
}else{
scene.addEventListener("loaded",startMindAR);
}

}else{

document.getElementById("error-msg").style.display="block";

}

});

function startMindAR(){

const scene=document.getElementById("ar-scene");
const arSystem=scene.systems["mindar-image-system"];

if(arSystem){
arSystem.start();
}

}

</script>

</body>
</html>
